document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

30px\">\n      <img src=\"3865219a-8960-4c52-ba8f-d76ba3316e4b\" alt=\"Cholla Behavioral Health\" style=\"height:38px;width:auto;display:block\">\n    <\u002Fdiv>\n    <div style=\"display:flex;gap:6px;background:#EEF4FB;padding:5px;border-radius:999px\">\n      <button onclick=\"{{ goKiosk }}\" style=\"display:flex;align-items:center;gap:8px;border:none;padding:9px 18px;border-radius:999px;font:600 14px Inter;background:{{ tabKioskBg }};color:{{ tabKioskFg }};transition:all .15s\">Client Kiosk<\u002Fbutton>\n      <button onclick=\"{{ goStaff }}\" style=\"display:flex;align-items:center;gap:8px;border:none;padding:9px 18px;border-radius:999px;font:600 14px Inter;background:{{ tabStaffBg }};color:{{ tabStaffFg }};transition:all .15s\">Staff Dashboard<\u002Fbutton>\n      <button onclick=\"{{ goLeader }}\" style=\"display:flex;align-items:center;gap:8px;border:none;padding:9px 18px;border-radius:999px;font:600 14px Inter;background:{{ tabLeaderBg }};color:{{ tabLeaderFg }};transition:all .15s\">Leadership<\u002Fbutton>\n    <\u002Fdiv>\n    <div style=\"margin-left:auto;display:flex;align-items:center;gap:14px\">\n      <span style=\"font-size:12.5px;color:#7A8AA3\">{{ surfaceHint }}<\u002Fspan>\n      <button onclick=\"{{ resetDemo }}\" style=\"border:1px solid #DCE3EE;background:#fff;color:#5A6B85;font:600 12.5px Inter;padding:8px 14px;border-radius:999px\">Reset demo<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fheader>\n\n  <div style=\"flex:1;display:flex;flex-direction:column\">\n\n    <!-- ===================================================== -->\n    <!-- SURFACE 1 — CLIENT KIOSK                               -->\n    <!-- ===================================================== -->\n    <sc-if value=\"{{ isKiosk }}\" hint-placeholder-val=\"{{ true }}\">\n    <main data-screen-label=\"Client Kiosk\" style=\"flex:1;display:flex;align-items:flex-start;justify-content:center;padding:34px 20px 48px;background:radial-gradient(120% 90% at 50% 0%,#DCE8F6 0%,#EEF4FB 55%)\">\n      <!-- device frame -->\n      <div style=\"width:430px;background:#21314F;border-radius:46px;padding:13px;box-shadow:0 30px 70px -24px rgba(33,49,79,.55),0 0 0 2px rgba(33,49,79,.06)\">\n        <div class=\"cholla-scroll\" style=\"background:#fff;border-radius:34px;overflow:hidden;height:792px;display:flex;flex-direction:column;position:relative\">\n\n          <!-- ---- KIOSK START ---- -->\n          <sc-if value=\"{{ kStart }}\" hint-placeholder-val=\"{{ true }}\">\n          <div class=\"cholla-scroll\" style=\"flex:1;overflow-y:auto;display:flex;flex-direction:column;padding:26px 24px 28px\">\n            <div style=\"display:flex;justify-content:center;margin:8px 0 6px\">\n              <img src=\"3865219a-8960-4c52-ba8f-d76ba3316e4b\" alt=\"Cholla Behavioral Health\" style=\"height:50px;width:auto\">\n            <\u002Fdiv>\n            <p style=\"text-align:center;font:600 12px Inter;letter-spacing:.14em;text-transform:uppercase;color:#4C84C4;margin:6px 0 2px\">Group Check-In Kiosk<\u002Fp>\n            <h1 style=\"text-align:center;font:600 22px Poppins;margin:0 0 18px;color:#21314F\">Facilitator setup<\u002Fh1>\n\n            <label style=\"font:600 12.5px Inter;color:#5A6B85;margin-bottom:8px;display:block\">Session time<\u002Flabel>\n            <div style=\"display:flex;gap:6px;background:#EEF4FB;padding:5px;border-radius:14px;margin-bottom:20px\">\n              <sc-for list=\"{{ kSessionSeg }}\" as=\"s\" hint-placeholder-count=\"3\">\n                <button onclick=\"{{ s.onClick }}\" style=\"flex:1;border:none;padding:11px 4px;border-radius:10px;font:600 14px Inter;background:{{ s.bg }};color:{{ s.fg }};box-shadow:{{ s.shadow }}\">{{ s.label }}<\u002Fbutton>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n\n            <label style=\"font:600 12.5px Inter;color:#5A6B85;margin-bottom:8px;display:block\">Select group<\u002Flabel>\n            <div style=\"display:grid;grid-template-columns:repeat(5,1fr);gap:9px;margin-bottom:12px\">\n Fspan>\n            <input type=\"date\" value=\"{{ leaderTo }}\" oninput=\"{{ onLeaderTo }}\" style=\"padding:8px 12px;border:1.5px solid #DCE3EE;border-radius:11px;font:600 13px Inter;color:#21314F;background:#fff;outline:none\">\n            <div style=\"display:flex;gap:6px;flex-wrap:wrap;align-items:center\">\n              <sc-for list=\"{{ leaderStatusChips }}\" as=\"c\" hint-placeholder-count=\"4\">\n                <button onclick=\"{{ c.onClick }}\" style=\"border:1.5px solid {{ c.bd }};background:{{ c.bg }};color:{{ c.fg }};font:600 12.5px Inter;padding:8px 14px;border-radius:999px\">{{ c.label }}<\u002Fbutton>\n              <\u002Fsc-for>\n              <button onclick=\"{{ leaderToday }}\" style=\"border:1.5px solid #BE6A45;background:#fff;color:#BE6A45;font:600 12.5px Inter;padding:8px 16px;border-radius:999px\">Today<\u002Fbutton>\n            <\u002Fdiv>\n            <input value=\"{{ leaderSearch }}\" oninput=\"{{ onLeaderSearch }}\" placeholder=\"Search group, facilitator, or client…\" style=\"margin-left:auto;width:250px;padding:10px 14px;border:1.5px solid #DCE3EE;border-radius:11px;font:500 13.5px Inter;color:#21314F;outline:none\">\n          <\u002Fdiv>\n\n          <!-- group cards -->\n          <sc-if value=\"{{ leaderHasCards }}\" hint-placeholder-val=\"{{ true }}\">\n          <div style=\"display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:18px\">\n            <sc-for list=\"{{ leaderCards }}\" as=\"c\" hint-placeholder-count=\"10\">\n              <button onclick=\"{{ c.onClick }}\" style=\"text-align:left;background:#fff;border:1px solid #DCE3EE;border-radius:20px;padding:0;overflow:hidden;cursor:pointer;box-shadow:0 1px 2px rgba(33,49,79,.04);transition:transform .12s,box-shadow .12s\" style-hover=\"transform:translateY(-3px);box-shadow:0 16px 32px -16px rgba(33,49,79,.32)\">\n                <div style=\"height:6px;background:{{ c.accent }}\"><\u002Fdiv>\n                <div style=\"padding:20px 22px 22px\">\n                  <div style=\"display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:14px\">\n                    <div style=\"display:flex;align-items:center;gap:11px\">\n                      <div style=\"width:42px;height:42px;border-radius:13px;background:{{ c.chipBg }};color:{{ c.chipFg }};display:flex;align-items:center;justify-content:center;font:700 18px Poppins;flex:none\">{{ c.n }}<\u002Fdiv>\n                      <div>\n                        <div style=\"font:600 16px Poppins;color:#21314F;line-height:1.15\">{{ c.name }}<\u002Fdiv>\n                        <div style=\"font:500 12px Inter;color:#7A8AA3;margin-top:2px\">{{ c.fac }}<\u002Fdiv>\n                      <\u002Fdiv>\n                    <\u002Fdiv>\n                    {{ c.badge }}\n                  <\u002Fdiv>\n                  <div style=\"display:flex;align-items:baseline;gap:8px;margin-bottom:14px\">\n                    <span style=\"font:700 30px Poppins;color:#21314F\">{{ c.countMain }}<\u002Fspan>\n                    <span style=\"font:600 15px Poppins;color:#9AA8BD\">/ {{ c.cap }}<\u002Fspan>\n                    <span style=\"font:500 13px Inter;color:#7A8AA3;margin-left:2px\">checked in<\u002Fspan>\n                  <\u002Fdiv>\n                  <div style=\"height:7px;background:#EEF4FB;border-radius:999px;overflow:hidden;margin-bottom:14px\"><div style=\"height:100%;width:{{ c.barPct }};background:{{ c.accent }};border-radius:999px\"><\u002Fdiv><\u002Fdiv>\n                  <div style=\"display:flex;gap:18px\">\n                    <div><div style=\"font:700 17px Poppins;color:#4C84C4\">{{ c.present }}<\u002Fdiv><div style=\"font:500 11px Inter;color:#9AA8BD\">present now<\u002Fdiv><\u002Fdiv>\n                    <div><div style=\"font:700 17px Poppins;color:#21314F\">{{ c.att }}<\u002Fdiv><div style=\"font:500 11px Inter;color:#9AA8BD\">attendance<\u002Fdiv><\u002Fdiv>\n                    <div style=\"margin-left:auto;align-self:flex- \">{{ detailN }}<\u002Fdiv>\n              <div>\n                <div style=\"font:600 21px Poppins\">{{ detailName }}<\u002Fdiv>\n                <div style=\"font:500 13px Inter;color:#9DB6D8;margin-top:1px\">{{ detailFac }} · {{ detailSession }} session · {{ today }}<\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"margin-left:auto\">{{ detailBadge }}<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"padding:24px 36px 44px;max-width:1280px;margin:0 auto\">\n          <div style=\"display:grid;grid-template-columns:repeat(5,1fr);gap:16px;margin-bottom:22px\">\n            <sc-for list=\"{{ detailKpis }}\" as=\"k\" hint-placeholder-count=\"5\">\n              <div style=\"background:#fff;border:1px solid #DCE3EE;border-radius:18px;padding:18px 20px\">\n                <div style=\"font:500 12px Inter;letter-spacing:.04em;text-transform:uppercase;color:#7A8AA3\">{{ k.label }}<\u002Fdiv>\n                <div style=\"font:700 34px Poppins;color:{{ k.color }};margin-top:6px;line-height:1\">{{ k.value }}<\u002Fdiv>\n                <div style=\"font:500 12px Inter;color:#9AA8BD;margin-top:5px\">{{ k.sub }}<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n\n          <div style=\"background:#fff;border:1px solid #DCE3EE;border-radius:16px;padding:12px 16px;margin-bottom:18px;display:flex;align-items:center;gap:12px;flex-wrap:wrap\">\n            <div style=\"display:flex;gap:6px;flex-wrap:wrap\">\n              <sc-for list=\"{{ detailStatusChips }}\" as=\"c\" hint-placeholder-count=\"6\">\n                <button onclick=\"{{ c.onClick }}\" style=\"border:1.5px solid {{ c.bd }};background:{{ c.bg }};color:{{ c.fg }};font:600 12.5px Inter;padding:8px 14px;border-radius:999px\">{{ c.label }}<\u002Fbutton>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n            <input value=\"{{ detailSearch }}\" oninput=\"{{ onDetailSearch }}\" placeholder=\"Search
